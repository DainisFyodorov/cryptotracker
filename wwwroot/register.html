<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — CryptoTracker</title>
    <meta name="robots" content="noindex" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="/css/style.css" rel="stylesheet" />
</head>

<body class="bg-dark text-light d-flex align-items-center" style="min-height:100vh">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-5 col-lg-4">
                <div class="text-center mb-4">
                    <a href="/" class="text-warning text-decoration-none">
                        <h2 class="fw-bold"><i class="bi bi-currency-bitcoin"></i> CryptoTracker</h2>
                    </a>
                </div>
                <div class="card bg-black border-secondary">
                    <div class="card-body p-4">
                        <h4 class="card-title mb-4">Create an Account</h4>
                        <div id="alertBox" class="d-none alert" role="alert"></div>

                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" id="username"
                                class="form-control bg-secondary text-light border-secondary"
                                placeholder="Come up with a username" autocomplete="username" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control bg-secondary text-light border-secondary"
                                placeholder="example@mail.com" autocomplete="email" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password <span class="text-secondary small">(min. 6
                                    symbols)</span></label>
                            <div class="input-group">
                                <input type="password" id="password"
                                    class="form-control bg-secondary text-light border-secondary"
                                    placeholder="Come up with a password" autocomplete="new-password" />
                                <button class="btn btn-secondary" type="button" onclick="togglePass('password')">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Repeat password</label>
                            <input type="password" id="password2"
                                class="form-control bg-secondary text-light border-secondary"
                                placeholder="Repeat password" autocomplete="new-password" />
                        </div>
                        <button id="regBtn" onclick="doRegister()" class="btn btn-warning w-100 fw-bold">
                            Register
                        </button>
                        <hr class="border-secondary" />
                        <p class="text-center text-secondary mb-0">
                            Already have an account? <a href="/login.html" class="text-warning">Log In</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        checkAuthRedirect('/portfolio.html');

        async function doRegister() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;
            const btn = document.getElementById('regBtn');

            if (!username || !email || !password) { showAlert('Fill all fields', 'danger'); return; }
            if (password !== password2) { showAlert('Passwords do not match', 'danger'); return; }
            if (password.length < 6) { showAlert('Password should be at least 6 symbols', 'danger'); return; }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Registration...';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('username', data.username);
                    window.location.href = '/portfolio.html';
                } else {
                    showAlert(data.message || 'Registration error', 'danger');
                }
            } catch {
                showAlert('Connection error', 'danger');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Register';
            }
        }

        function showAlert(msg, type) {
            const box = document.getElementById('alertBox');
            box.className = `alert alert-${type}`;
            box.textContent = msg;
            box.classList.remove('d-none');
        }
    </script>
</body>

</html>
