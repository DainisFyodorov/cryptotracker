<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In — CryptoTracker</title>
    <meta name="robots" content="noindex" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="/css/style.css" rel="stylesheet" />
</head>

<body class="bg-dark text-light d-flex align-items-center" style="min-height:100vh">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-5 col-lg-4">
                <div class="text-center mb-4">
                    <a href="/" class="text-warning text-decoration-none">
                        <h2 class="fw-bold"><i class="bi bi-currency-bitcoin"></i> CryptoTracker</h2>
                    </a>
                </div>
                <div class="card bg-black border-secondary">
                    <div class="card-body p-4">
                        <h4 class="card-title mb-4">Log In Page</h4>
                        <div id="alertBox" class="d-none alert" role="alert"></div>

                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" id="username"
                                class="form-control bg-secondary text-light border-secondary"
                                placeholder="Enter username" autocomplete="username" />
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <input type="password" id="password"
                                    class="form-control bg-secondary text-light border-secondary"
                                    placeholder="Enter password" autocomplete="current-password" />
                                <button class="btn btn-secondary" type="button" onclick="togglePass('password')">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>
                        <button id="loginBtn" onclick="doLogin()" class="btn btn-warning w-100 fw-bold">
                            Log In
                        </button>
                        <hr class="border-secondary" />
                        <p class="text-center text-secondary mb-0">
                            Don't have an account'? <a href="/register.html" class="text-warning">Register</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        // If already logged in - redirect
        checkAuthRedirect('/portfolio.html');

        async function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            if (!username || !password) {
                showAlert('Fill all fields', 'danger');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('username', data.username);
                    window.location.href = '/portfolio.html';
                } else {
                    showAlert(data.message || 'Login error', 'danger');
                }
            } catch {
                showAlert('Connection error', 'danger');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Log In';
            }
        }

        function showAlert(msg, type) {
            const box = document.getElementById('alertBox');
            box.className = `alert alert-${type}`;
            box.textContent = msg;
            box.classList.remove('d-none');
        }

        // Enter → login
        document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    </script>
</body>

</html>
