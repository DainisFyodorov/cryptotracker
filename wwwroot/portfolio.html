<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My portfolio — CryptoTracker</title>
    <meta name="robots" content="noindex" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="/css/style.css" rel="stylesheet" />
</head>

<body class="bg-dark text-light" style="visibility:hidden">

    <!-- Immediate check for auth before rendering page -->
    <script>
        (async () => {
            try {
                const res = await fetch('/api/auth/me');
                if (!res.ok) {
                    // Not authorized - redirect
                    window.location.replace('/login.html');
                } else {
                    // Authorized - showing the page
                    document.body.style.visibility = 'visible';
                }
            } catch {
                window.location.replace('/login.html');
            }
        })();
    </script>

    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="/">
                <i class="bi bi-currency-bitcoin"></i> CryptoTracker
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Market</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/portfolio.html">Portfolio</a></li>
                </ul>
                <div class="d-flex align-items-center gap-2">
                    <span class="text-warning"><i class="bi bi-person-circle"></i> <span id="navUsername"></span></span>
                    <button onclick="logout()" class="btn btn-outline-secondary btn-sm">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-4">

        <!-- Сводка портфеля -->
        <div class="row g-3 mb-4" id="summaryCards">
            <div class="col-12 col-md-4">
                <div class="card bg-black border-secondary h-100">
                    <div class="card-body">
                        <div class="text-secondary small mb-1">Portfolio price</div>
                        <div class="h3 fw-bold text-warning" id="totalValue">—</div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="card bg-black border-secondary h-100">
                    <div class="card-body">
                        <div class="text-secondary small mb-1">Profit / Loss</div>
                        <div class="h3 fw-bold" id="totalProfit">—</div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="card bg-black border-secondary h-100">
                    <div class="card-body">
                        <div class="text-secondary small mb-1">Profitability</div>
                        <div class="h3 fw-bold" id="totalProfitPercent">—</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Кнопка добавить -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0">My assets</h4>
            <button class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#addModal">
                <i class="bi bi-plus-lg"></i> Add coin
            </button>
        </div>

        <!-- Таблица портфеля -->
        <div class="table-responsive rounded">
            <table class="table table-dark table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th>Монета</th>
                        <th class="text-end">Amount</th>
                        <th class="text-end">Purchase price</th>
                        <th class="text-end">Current price</th>
                        <th class="text-end">Price</th>
                        <th class="text-end">P/L</th>
                        <th class="text-end">24h %</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="portfolioTableBody">
                    <tr>
                        <td colspan="8" class="text-center py-5">
                            <div class="spinner-border text-warning" role="status"></div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Модалка добавления монеты -->
    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark border-secondary text-light">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Add a coin to your portfolio</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="addAlertBox" class="d-none alert mb-3" role="alert"></div>

                    <!-- Поиск монеты -->
                    <div class="mb-3 position-relative">
                        <label class="form-label">Coin</label>
                        <input type="text" id="coinSearch" class="form-control bg-secondary text-light border-secondary"
                            placeholder="Enter coin name or ticker (ex. Bitcoin)" autocomplete="off" />
                        <div id="coinSearchResults" class="list-group position-absolute w-100 z-3 d-none"
                            style="top:100%;max-height:200px;overflow-y:auto"></div>
                    </div>
                    <input type="hidden" id="selectedCoinId" />
                    <input type="hidden" id="selectedCoinName" />
                    <input type="hidden" id="selectedCoinSymbol" />

                    <div class="row g-2">
                        <div class="col-6">
                            <label class="form-label">Amount of coins</label>
                            <input type="number" id="coinAmount"
                                class="form-control bg-secondary text-light border-secondary" placeholder="ex. 0.5"
                                step="any" min="0" />
                        </div>
                        <div class="col-6">
                            <label class="form-label">Buying price (USD)</label>
                            <input type="number" id="coinBuyPrice"
                                class="form-control bg-secondary text-light border-secondary" placeholder="ex. 45000"
                                step="any" min="0" />
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-secondary">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-warning" id="addBtn" onclick="addCoin()">
                        <i class="bi bi-plus-lg"></i> Add
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/portfolio.js"></script>
</body>

</html>
