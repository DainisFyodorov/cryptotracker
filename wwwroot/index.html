<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CryptoTracker - Cryptocurrency Rates</title>
    <meta name="description"
        content="Track cryptocurrency prices in real time and manage your portfolio." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="/" />
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="/css/style.css" rel="stylesheet" />
</head>

<body class="bg-dark text-light">

    <!-- Navibation bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="/">
                <i class="bi bi-currency-bitcoin"></i> CryptoTracker
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="/">Market</a></li>
                    <li class="nav-item"><a class="nav-link" href="/portfolio.html">Portfolio</a></li>
                </ul>
                <div id="authButtons" class="d-flex gap-2">
                    <a href="/login.html" class="btn btn-outline-warning btn-sm">Log In</a>
                    <a href="/register.html" class="btn btn-warning btn-sm">Register</a>
                </div>
                <div id="userInfo" class="d-none align-items-center gap-2">
                    <span class="text-warning"><i class="bi bi-person-circle"></i> <span id="navUsername"></span></span>
                    <button onclick="logout()" class="btn btn-outline-secondary btn-sm">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <div class="container py-4">
        <div class="row mb-4">
            <div class="col">
                <h1 class="h3 fw-bold">📊 Cryptocurrency market</h1>
                <p class="text-secondary mb-0">Top 20 by market capitalization. Data is being updated every 2 minutes.</p>
            </div>
            <div class="col-auto align-self-end">
                <span class="badge bg-success" id="updateBadge">
                    <i class="bi bi-circle-fill"></i> Actual
                </span>
            </div>
        </div>

        <!-- Search -->
        <div class="mb-3">
            <input type="text" id="searchInput" class="form-control bg-secondary text-light border-secondary"
                placeholder="🔍 Search by name or ticker..." />
        </div>

        <!-- Table -->
        <div class="table-responsive rounded">
            <table class="table table-dark table-hover align-middle mb-0">
                <thead class="table-black">
                    <tr>
                        <th>#</th>
                        <th>Coin</th>
                        <th class="text-end">Price (USD)</th>
                        <th class="text-end">24h %</th>
                        <th class="text-end d-none d-md-table-cell">Volume 24h</th>
                        <th class="text-end d-none d-lg-table-cell">Max 24h</th>
                        <th class="text-end d-none d-lg-table-cell">Min 24h</th>
                    </tr>
                </thead>
                <tbody id="cryptoTableBody">
                    <tr>
                        <td colspan="7" class="text-center py-5">
                            <div class="spinner-border text-warning" role="status"></div>
                            <p class="mt-2 text-secondary">Loading data...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <p class="text-secondary small mt-2">Data source: <a href="https://coingecko.com" target="_blank"
                class="text-secondary">CoinGecko API</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
</body>

</html>
